<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Koden hittades inte</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font: 18px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
      padding: 1.5rem;
    }
    main { max-width: 32rem; text-align: center; }
    h1 { font-size: 1.5rem; margin: 0 0 0.75rem; }
    p { margin: 0; opacity: 0.75; }
  </style>
</head>
<body>
  <main>
    <h1>Den här koden finns inte</h1>
    <p>Koden är inte registrerad eller har tagits bort.</p>
  </main>
</body>
</html>
