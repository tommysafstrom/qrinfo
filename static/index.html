<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>QR Info</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    h1 { font-size: 1.75rem; margin: 0 0 0.25rem; }
    p.lead { margin: 0 0 2rem; opacity: 0.75; }
    p.empty {
      grid-column: 1 / -1;
      text-align: center;
      opacity: 0.6;
      padding: 2rem 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }
    .card {
      border: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .card .badge {
      width: 100%;
      max-width: 280px;
      border-radius: 8px;
      overflow: hidden;
      line-height: 0;
    }
    .card .badge svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .card h2 { margin: 0; font-size: 1.125rem; }
    .card a {
      font-size: 0.875rem;
      opacity: 0.75;
      text-decoration: none;
      word-break: break-all;
      text-align: center;
    }
    .card a:hover { text-decoration: underline; }
    footer {
      margin-top: 3rem;
      font-size: 0.875rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>QR Info</h1>
    <p class="lead">Skanna en kod nedan med telefonen.</p>

    <p><a href="/scan.html">📷 Skanna med kameran i webbläsaren →</a></p>

    <div class="grid">
      <!-- {{cards}} -->
    </div>

    <footer>
      QR-koderna pekar på den här sidans
      <code>/q/&lt;kund&gt;/&lt;kod&gt;</code> som omdirigerar till
      destinationen. Koden för en plakett ändras aldrig — bara vart den pekar.
    </footer>
  </main>

</body>
</html>
