<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Skanna — QR Info</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    /* Live camera fills the whole screen while idle. When a page is shown it
       shrinks to a floating thumbnail (see .scanning) that the user can aim a
       new QR code at, so the camera never has to render behind an overlay. */
    .camera {
      position: fixed; inset: 0; z-index: 10; background: #000;
      transition: inset 0.25s ease, width 0.25s ease, height 0.25s ease, border-radius 0.25s ease;
    }
    .camera video { width: 100%; height: 100%; object-fit: cover; }
    .camera .overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; text-align: center;
      color: #fff; font-size: 0.95rem;
    }
    /* Thumbnail mode: camera floats in the top-left corner at a quarter of the
       viewport (half the width × half the height = 1/4 of the screen area),
       on top of the page. */
    body.scanning .camera {
      inset: calc(env(safe-area-inset-top) + 0.75rem) auto auto 0.75rem;
      width: 50vw; height: 50vh;
      z-index: 40; border-radius: 0.9rem; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.85);
    }
    .cam-hint {
      position: absolute; inset: auto 0 0 0; z-index: 1;
      padding: 0.15rem; text-align: center;
      font-size: 0.6rem; color: #fff;
      background: rgba(0,0,0,0.55);
      display: none;
    }
    body.scanning .cam-hint { display: block; }

    /* Heading + status, floating over the idle camera at the top. Hidden once
       a page is shown (the page's own bar takes over). */
    header {
      position: fixed; inset: 0 0 auto 0; z-index: 30;
      padding: calc(env(safe-area-inset-top) + 0.75rem) 1rem 0.75rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
      pointer-events: none;
    }
    body.scanning header { display: none; }
    h1 { font-size: 1.25rem; margin: 0; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
    #status { margin: 0.25rem 0 0; font-size: 0.9rem; opacity: 0.85; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }

    /* Destination: the linked page, full-screen and opaque so it's readable. */
    .dest {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; background: #fff;
    }
    .dest .bar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: calc(env(safe-area-inset-top) + 0.5rem) 0.75rem 0.5rem;
      background: #000; color: #fff;
    }
    .dest .bar .label { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dest .bar button {
      flex: none; appearance: none; border: 0; cursor: pointer;
      background: rgba(255,255,255,0.15); color: #fff;
      width: 2rem; height: 2rem; border-radius: 50%;
      font-size: 1.1rem; line-height: 1; display: grid; place-items: center;
    }
    .dest .frame-wrap { position: relative; flex: 1; min-height: 0; }
    .dest iframe { width: 100%; height: 100%; border: 0; background: #fff; }

    /* Custom Wikipedia view: lead image first, a short summary, then the full
       article extract revealed on scroll. Rendered from the Wikipedia REST API
       so we control the styling instead of embedding their page. */
    .wiki {
      position: absolute; inset: 0; display: none;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      background: #fff; color: #111;
    }
    .dest.is-wiki .wiki { display: block; }
    .dest.is-wiki iframe { display: none; }
    .wiki .hero {
      width: 100%; aspect-ratio: 16 / 10; object-fit: cover;
      display: block; background: #e9e9e9;
    }
    .wiki .body { padding: 1rem 1.25rem 3rem; max-width: 42rem; margin: 0 auto; }
    .wiki h2 { font-size: 1.5rem; margin: 0.25rem 0 0.5rem; line-height: 1.2; }
    .wiki .summary { font-size: 1.05rem; margin: 0 0 1rem; }
    .wiki .more { font-size: 1rem; }
    .wiki .more p { margin: 0 0 1rem; }
    .wiki .read-more {
      appearance: none; border: 0; cursor: pointer;
      display: inline-block; margin: 0.5rem 0 1rem;
      padding: 0.55rem 1.1rem; border-radius: 0.6rem;
      background: #2563eb; color: #fff; font-weight: 600; font-size: 1rem;
    }
    .wiki .credit { margin-top: 2rem; font-size: 0.8rem; color: #666; }
    .wiki .credit a { color: #2563eb; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="camera">
    <video id="video" muted playsinline></video>
    <div id="overlay" class="overlay hidden"></div>
    <div class="cam-hint">Skanna ny kod</div>
  </div>

  <header>
    <h1>Skanna QR-kod</h1>
    <p id="status">Startar kameran…</p>
  </header>

  <section id="dest" class="dest hidden">
    <div class="bar">
      <span id="label" class="label"></span>
      <button id="close" type="button" aria-label="Stäng">✕</button>
    </div>
    <div class="frame-wrap">
      <iframe id="frame" title="Skannad sida"></iframe>
      <article id="wiki" class="wiki">
        <img id="wikiHero" class="hero" alt="" hidden>
        <div class="body">
          <h2 id="wikiTitle"></h2>
          <p id="wikiSummary" class="summary"></p>
          <button id="wikiReadMore" type="button" class="read-more hidden">Läs mer ↓</button>
          <div id="wikiMore" class="more"></div>
          <p class="credit" id="wikiCredit"></p>
        </div>
      </article>
    </div>
  </section>

  <script src="/vendor/zxing-browser-0.2.0.min.js"></script>
  <script src="/scan.js"></script>
</body>
</html>
