<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Skanna — QR Info</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    /* Full-screen live camera. Shown while scanning, hidden (and stopped) once a
       destination or the history list is open. No inline thumbnail mode. */
    .camera {
      position: fixed; inset: 0; z-index: 10; background: #000;
    }
    .camera video { width: 100%; height: 100%; object-fit: cover; }
    .camera .overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; text-align: center;
      color: #fff; font-size: 0.95rem;
    }
    /* While a page or the history is open we don't need the camera on screen. */
    body.viewing .camera { display: none; }

    /* Persistent top bar with the two actions. Sits above everything. */
    .topbar {
      position: fixed; inset: 0 0 auto 0; z-index: 50;
      display: flex; gap: 0.5rem; align-items: center;
      padding: calc(env(safe-area-inset-top) + 0.6rem) 0.75rem 0.6rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0));
    }
    .topbar button {
      appearance: none; border: 0; cursor: pointer;
      padding: 0.55rem 0.9rem; border-radius: 999px;
      font-size: 0.95rem; font-weight: 600; line-height: 1;
      background: rgba(255,255,255,0.16); color: #fff;
      backdrop-filter: blur(6px);
    }
    .topbar button.primary { background: #2563eb; }
    .topbar .spacer { flex: 1; }
    /* While the history ("Koder") view is open it has its own bar (with the
       Skanna-ny/Spara/Ångra/close actions), so hide the persistent top bar to
       avoid the two overlapping. */
    body.history-open .topbar { display: none; }

    /* Status line, floating under the top bar over the idle camera. */
    #status {
      position: fixed; z-index: 30;
      inset: calc(env(safe-area-inset-top) + 3.4rem) 1rem auto;
      margin: 0; font-size: 0.9rem; opacity: 0.9; text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6); pointer-events: none;
    }
    body.viewing #status { display: none; }

    /* Destination: the linked page, full-screen and opaque so it's readable. */
    .dest {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; background: #fff;
    }
    .dest .bar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: calc(env(safe-area-inset-top) + 0.5rem) 0.75rem 0.5rem;
      background: #000; color: #fff;
    }
    .dest .bar .label { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dest .bar button {
      flex: none; appearance: none; border: 0; cursor: pointer;
      background: rgba(255,255,255,0.15); color: #fff;
      width: 2rem; height: 2rem; border-radius: 50%;
      font-size: 1.1rem; line-height: 1; display: grid; place-items: center;
    }
    .dest .frame-wrap { position: relative; flex: 1; min-height: 0; }
    .dest iframe { width: 100%; height: 100%; border: 0; background: #fff; }

    /* Custom Wikipedia view: lead image first, a short summary, then the full
       article extract revealed on scroll. Rendered from the Wikipedia REST API
       so we control the styling instead of embedding their page. */
    .wiki {
      position: absolute; inset: 0; display: none;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      background: #fff; color: #111;
    }
    .dest.is-wiki .wiki { display: block; }
    .dest.is-wiki iframe { display: none; }
    .wiki .hero {
      width: 100%; aspect-ratio: 16 / 10; object-fit: cover;
      display: block; background: #e9e9e9;
    }
    .wiki .body { padding: 1rem 1.25rem 3rem; max-width: 42rem; margin: 0 auto; }
    .wiki h2 { font-size: 1.5rem; margin: 0.25rem 0 0.5rem; line-height: 1.2; }
    .wiki .summary { font-size: 1.05rem; margin: 0 0 1rem; }
    .wiki .more { font-size: 1rem; }
    .wiki .more p { margin: 0 0 1rem; }
    .wiki .read-more {
      appearance: none; border: 0; cursor: pointer;
      display: inline-block; margin: 0.5rem 0 1rem;
      padding: 0.55rem 1.1rem; border-radius: 0.6rem;
      background: #2563eb; color: #fff; font-weight: 600; font-size: 1rem;
    }
    .wiki .credit { margin-top: 2rem; font-size: 0.8rem; color: #666; }
    .wiki .credit a { color: #2563eb; }

    /* History ("Koder"): a grid of previously-scanned codes as thumbnails. */
    .history {
      position: fixed; inset: 0; z-index: 45;
      display: none; flex-direction: column; background: #111; color: #fff;
    }
    body.history-open .history { display: flex; }
    .history .bar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: calc(env(safe-area-inset-top) + 0.5rem) 0.75rem 0.5rem;
      background: #000;
    }
    .history .bar .label { flex: 1; font-weight: 600; }
    .history .bar button {
      flex: none; appearance: none; border: 0; cursor: pointer;
      background: rgba(255,255,255,0.15); color: #fff;
      width: 2rem; height: 2rem; border-radius: 50%;
      font-size: 1.1rem; line-height: 1; display: grid; place-items: center;
    }
    .history .grid {
      flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(8rem, 1fr));
      gap: 0.75rem; padding: 0.75rem 0.75rem 2rem;
      align-content: start;
    }
    .history .card {
      appearance: none; border: 0; cursor: pointer; text-align: left;
      background: #1d1d1f; color: #fff; border-radius: 0.8rem; overflow: hidden;
      padding: 0; display: flex; flex-direction: column;
    }
    .history .card .thumb {
      width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
      background: #2a2a2c; display: block;
    }
    .history .card .name {
      padding: 0.5rem 0.6rem; font-size: 0.85rem; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .history .empty {
      padding: 3rem 1.5rem; text-align: center; color: #aaa; font-size: 0.95rem;
    }

    /* Save/cancel bar, shown in the history bar only while in delete mode. */
    .history .edit-bar { display: flex; gap: 0.5rem; }
    .history .edit-bar button {
      width: auto; height: auto; border-radius: 999px;
      padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 600;
    }
    .history .edit-bar button.primary { background: #2563eb; }
    .history .edit-bar button.ghost { background: rgba(255,255,255,0.15); }

    /* The trash toggle is itself a card at the end of the grid: a big red
       wastebasket centered on a plain tile. */
    .history .card.trash {
      align-items: center; justify-content: center;
      background: #1d1d1f; aspect-ratio: 1 / 1; padding: 0;
      color: #ff5252; font-size: 2.4rem; line-height: 1;
    }
    body.history-deleting .history .card.trash {
      background: #3a1414; color: #ff8a80;
      outline: 2px solid #ff5252; outline-offset: -2px;
    }

    /* In delete mode every (non-trash) card gets a red wastebasket overlay in
       its center; tapping the card toggles it for removal. */
    .history .card .del-overlay { display: none; }
    body.history-deleting .history .card:not(.trash) .del-overlay {
      display: grid; place-items: center;
      position: absolute; inset: 0; z-index: 2;
      background: rgba(0,0,0,0.45); color: #ff5252; font-size: 2rem;
    }
    body.history-deleting .history .card:not(.trash) {
      position: relative;
    }
    body.history-deleting .history .card.marked {
      outline: 2px solid #ff5252; outline-offset: -2px;
    }
    body.history-deleting .history .card.marked .del-overlay {
      background: rgba(180,0,0,0.55); color: #fff;
    }
    body.history-deleting .history .card.marked .thumb,
    body.history-deleting .history .card.marked .name { opacity: 0.4; }

    /* Classic wastebasket icon (inline SVG); inherits the card's color. */
    .trash-icon { display: block; fill: currentColor; }
    .history .card.trash .trash-icon { width: 2.4rem; height: 2.4rem; }
    .history .card .del-overlay .trash-icon { width: 2rem; height: 2rem; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="camera">
    <video id="video" muted playsinline></video>
    <div id="overlay" class="overlay hidden"></div>
  </div>

  <div class="topbar">
    <button id="scanNew" type="button" class="primary">Skanna ny kod</button>
    <button id="showHistory" type="button">Tidigare</button>
    <span class="spacer"></span>
  </div>

  <p id="status">Startar kameran…</p>

  <section id="dest" class="dest hidden">
    <div class="bar">
      <span id="label" class="label"></span>
      <button id="close" type="button" aria-label="Stäng">✕</button>
    </div>
    <div class="frame-wrap">
      <iframe id="frame" title="Skannad sida"></iframe>
      <article id="wiki" class="wiki">
        <img id="wikiHero" class="hero" alt="" hidden>
        <div class="body">
          <h2 id="wikiTitle"></h2>
          <p id="wikiSummary" class="summary"></p>
          <button id="wikiReadMore" type="button" class="read-more hidden">Läs mer ↓</button>
          <div id="wikiMore" class="more"></div>
          <p class="credit" id="wikiCredit"></p>
        </div>
      </article>
    </div>
  </section>

  <section id="history" class="history">
    <div class="bar">
      <span class="label"></span>
      <div id="historyEditBar" class="edit-bar hidden">
        <button id="historyCancel" type="button" class="ghost">Ångra</button>
        <button id="historySave" type="button" class="primary">Släng</button>
      </div>
      <button id="historyClose" type="button" aria-label="Stäng">✕</button>
    </div>
    <div id="historyGrid" class="grid"></div>
  </section>

  <script src="/vendor/zxing-browser-0.2.0.min.js"></script>
  <script src="/scan.js"></script>
</body>
</html>
